kind = "web"
previewPath = "/"
title = "Hotel Management"
version = "1.0.0"
id = "artifacts/hotel-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25164
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hotel-app run dev"

[services.env]
PORT = "25164"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hotel-app", "run", "build"]
publicDir = "artifacts/hotel-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
