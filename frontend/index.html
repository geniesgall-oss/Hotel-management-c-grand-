<!DOCTYPE html><html>
<head>
<title>Hotel C Grand Dashboard</title>
</head><body><h1>Hotel C Grand Rooms</h1><div id="rooms"></div><form onsubmit="login(event)">
  <input name="username" placeholder="Username">
  <input name="password" type="password" placeholder="Password">
  <button type="submit">Login</button>
</form><script src="app.js"></script><script>
const API = "https://hotel-management-c-grand-api-server-one.vercel.app";

async function login(e) {
  e.preventDefault();

  const username = document.querySelector("input[name='username']").value;
  const password = document.querySelector("input[name='password']").value;

  const res = await fetch(`${API}/api/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
  alert("Login success");
  window.location.href = "/";
  }
  } else {
    alert("Invalid login");
  }
}
</script></body>
</html>
