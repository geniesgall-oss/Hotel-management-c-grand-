openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Hotel Management API
servers:
  - url: /api
tags:
  - name: health
  - name: auth
  - name: rooms
  - name: bookings
  - name: history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  /bookings:
    get:
      operationId: getBookings
      tags: [bookings]
      responses:
        "200":
          description: Active bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Room already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    put:
      operationId: updateBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/checkout:
    post:
      operationId: checkoutBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryRecord"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history:
    get:
      operationId: getHistory
      tags: [history]
      responses:
        "200":
          description: History records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryRecord"

  /history/{id}:
    delete:
      operationId: deleteHistory
      tags: [history]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: History record deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, staff]
        email:
          type: string
          nullable: true
      required: [id, username, role]

    Room:
      type: object
      properties:
        id:
          type: integer
        number:
          type: string
        status:
          type: string
          enum: [available, occupied]
        currentBooking:
          $ref: "#/components/schemas/Booking"
          nullable: true
      required: [id, number, status]

    Booking:
      type: object
      properties:
        id:
          type: integer
        guestName:
          type: string
        phone:
          type: string
        roomNumber:
          type: string
        checkInTime:
          type: string
        roomAmount:
          type: number
        amountPaid:
          type: number
        paymentMethod:
          type: string
        dueAmount:
          type: number
        checkedInBy:
          type: string
      required: [id, guestName, phone, roomNumber, checkInTime, roomAmount, amountPaid, paymentMethod, dueAmount, checkedInBy]

    CreateBookingRequest:
      type: object
      properties:
        guestName:
          type: string
        phone:
          type: string
        roomNumber:
          type: string
        roomAmount:
          type: number
        amountPaid:
          type: number
        paymentMethod:
          type: string
      required: [guestName, phone, roomNumber, roomAmount, amountPaid, paymentMethod]

    UpdateBookingRequest:
      type: object
      properties:
        guestName:
          type: string
        phone:
          type: string
        roomAmount:
          type: number
        amountPaid:
          type: number
        paymentMethod:
          type: string
      required: [guestName, phone, roomAmount, amountPaid, paymentMethod]

    CheckoutRequest:
      type: object
      properties:
        duePaymentMethod:
          type: string
        dueAmountPaid:
          type: number
      required: [duePaymentMethod, dueAmountPaid]

    HistoryRecord:
      type: object
      properties:
        id:
          type: integer
        guestName:
          type: string
        phone:
          type: string
        roomNumber:
          type: string
        checkInTime:
          type: string
        checkOutTime:
          type: string
        roomAmount:
          type: number
        amountPaidAtCheckin:
          type: number
        paymentMethodAtCheckin:
          type: string
        dueAmountPaidAtCheckout:
          type: number
        duePaymentMethodAtCheckout:
          type: string
        totalPaid:
          type: number
        checkedInBy:
          type: string
        checkedOutBy:
          type: string
      required: [id, guestName, phone, roomNumber, checkInTime, checkOutTime, roomAmount, amountPaidAtCheckin, paymentMethodAtCheckin, dueAmountPaidAtCheckout, duePaymentMethodAtCheckout, totalPaid, checkedInBy, checkedOutBy]
